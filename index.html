<script type="text/babel">
Object.assign(window, { AssistantView });

function AssistantView() {
  const [inputValue, setInputValue] = React.useState('');
  const [focused, setFocused] = React.useState(false);
  const [messages, setMessages] = React.useState([]);
  const [loading, setLoading] = React.useState(false);

  const chips = [
    'Who owns this methodology now',
    'Knowledge gap before next handoff',
    'Last QR failure, root cause',
    'Expertise at risk of leaving'
  ];

  function handleChipClick(text) {
    setInputValue(text);
  }

  function handleSend() {
    if (!inputValue.trim()) return;
    const q = inputValue.trim();
    setMessages(m => [...m, { role: 'user', text: q }]);
    setInputValue('');
    setLoading(true);
    setTimeout(() => {
      setMessages(m => [...m, { role: 'assistant', text: 'Based on the organizational knowledge connected to this context, I found relevant insights across 14 documents and 3 past projects. The Arctic project post-mortem (March 2024) identified three key lessons around thermal cycling tolerance…' }]);
      setLoading(false);
    }, 1200);
  }

  function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  }

  const hasConversation = messages.length > 0;

  // Auto-expand textarea
  function handleInput(e) {
    setInputValue(e.target.value);
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 200) + 'px';
  }

  return React.createElement('div', { style: aStyles.container },
    !hasConversation && React.createElement('div', { style: aStyles.emptyState },
      React.createElement('h1', { style: aStyles.headline }, "What's on your mind?"),
      React.createElement('p', { style: aStyles.subheadline }, 'Contribute your context')
    ),

    hasConversation && React.createElement('div', { style: aStyles.messages },
      messages.map((m, i) =>
        React.createElement('div', { key: i, style: m.role === 'user' ? aStyles.msgUser : aStyles.msgAssistant },
          m.role === 'assistant' && React.createElement('div', { style: aStyles.assistantLabel }, 'Eximens'),

        React.createElement('div', { style: aStyles.assistantLabel }, 'Eximens'),
        React.createElement('div', { style: aStyles.thinking },

          onFocus: () => setFocused(true),
